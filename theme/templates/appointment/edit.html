{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold mb-4">{{ titulo }}</h1>

<div class="bg-white shadow rounded p-6">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-4">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Actualizar</button>
            <a href="{% url 'appointments:appointment_list' %}" class="ml-2 text-sm text-slate-600">Cancelar</a>
        </div>
    </form>
</div>

{% endblock content %}
