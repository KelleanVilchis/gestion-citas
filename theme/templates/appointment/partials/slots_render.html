{% for slot in selected_slots %}
  <button type="button" data-time="{{ slot.time|time:'H:i' }}" class="slot-button rounded-2xl border px-4 py-3 text-sm font-semibold transition-colors duration-200 {% if slot.available %}border-slate-300 bg-white text-slate-700 hover:border-indigo-400 hover:bg-indigo-50{% else %}cursor-not-allowed border-slate-200 bg-slate-100 text-slate-400{% endif %}" {% if not slot.available %}disabled{% endif %}>
    <span>{{ slot.label }}</span>
    {% if not slot.available %}
      <span class="block text-[11px] text-slate-400 mt-1">Ocupado</span>
    {% endif %}
  </button>
{% empty %}
  <div class="col-span-full text-slate-500">No hay horas disponibles en este día. Cambia de día para continuar.</div>
{% endfor %}
